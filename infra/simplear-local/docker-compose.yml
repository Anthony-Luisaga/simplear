services:
  mysql:
    image: arm64v8/mysql:8.4.0
    container_name: simplear-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: simplear
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3301:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
